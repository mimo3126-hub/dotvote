html,body{height:100%;background:#1E1A14;}
@keyframes dotPop{
  0%{transform:translate(-50%,-50%) scale(0)}
  60%{transform:translate(-50%,-50%) scale(1.4)}
  100%{transform:translate(-50%,-50%) scale(1)}
}

  0%{transform:translate(-50%,-50%) scale(0.2);opacity:.8}

  from{opacity:0;transform:translateY(20px)}

  0%,100%{transform:translateY(0)}

  0%,70%,100%{transform:scale(1)}

  from{opacity:0;transform:translateX(40px)}

}
@keyframes slideL{
  from{opacity:0;transform:translateX(-40px)}
  to{opacity:1;transform:translateX(0)}
}

  0%,100%{opacity:1}
  50%{opacity:.3}

// Sound
function playPop() {
  try {
    var AudioCtx = window.AudioContext || window.webkitAudioContext;
    var ctx = new AudioCtx();
    var t = ctx.currentTime;
    function note(f1, f2, vol, type, dur) {
      var o = ctx.createOscillator();
      var g = ctx.createGain();
      o.type = type;
      o.connect(g);
      g.connect(ctx.destination);
      o.frequency.setValueAtTime(f1, t);
      o.frequency.exponentialRampToValueAtTime(f2, t + dur);
      g.gain.setValueAtTime(vol, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + dur);
      o.start();
      o.stop(t + dur);
    }
    note(900, 200, 0.45, 'sine', 0.18);
    note(450, 110, 0.2, 'triangle', 0.12);
  } catch(e) {}
}

function speak(txt) {
  try {
    window.speechSynthesis.cancel();
    var u = new SpeechSynthesisUtterance(txt);
    u.lang = 'ko-KR';
    u.rate = 0.75;
    u.pitch = 1.1;
    window.speechSynthesis.speak(u);
  } catch(e) {}
}
