<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>마을 의사결정 도트보팅</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .dot { animation: scaleIn 0.3s ease-out; }
        @keyframes scaleIn { from { transform: scale(0); } to { transform: scale(1); } }
        body { touch-action: manipulation; } /* 더블탭 확대 방지 */
    </style>
</head>
<body class="bg-gray-100 select-none">
    <div id="app" class="max-w-4xl mx-auto p-4">
        <header class="text-center py-8">
            <h1 class="text-4xl font-black text-gray-800 mb-4">가장 마음에 드는 곳에<br>스티커를 눌러주세요!</h1>
            <div id="status-bar" class="text-2xl font-bold text-blue-600 bg-white inline-block px-6 py-2 rounded-full shadow">
                남은 스티커: <span id="dots-left">3</span>개
            </div>
        </header>

        <div class="grid grid-cols-2 gap-6" id="option-container">
            </div>

        <footer class="mt-12 text-center">
            <button onclick="location.reload()" class="bg-gray-400 text-white px-8 py-4 rounded-2xl text-xl font-bold">다시하기</button>
            <button id="submit-btn" class="hidden bg-green-500 text-white px-12 py-4 rounded-2xl text-2xl font-bold ml-4 shadow-lg animate-pulse">결정 완료</button>
        </footer>
    </div>

    <script>
        const options = [
            { id: 1, title: '꽃길 조성', icon: '🌸' },
            { id: 2, title: '마을 잔치', icon: '🍲' },
            { id: 3, title: '창고 수리', icon: '🏠' },
            { id: 4, title: 'CCTV 설치', icon: '📹' }
        ];

        let dotsLeft = 3;
        const container = document.getElementById('option-container');

        options.forEach(opt => {
            const card = document.createElement('div');
            card.className = "bg-white p-8 rounded-3xl shadow-xl text-center relative border-4 border-transparent active:border-blue-500 transition-all";
            card.innerHTML = `
                <div class="text-8xl mb-4">${opt.icon}</div>
                <div class="text-3xl font-bold">${opt.title}</div>
                <div id="dots-${opt.id}" class="absolute top-4 right-4 flex flex-wrap-reverse gap-1 max-w-[80px]"></div>
            `;
            card.onclick = () => castVote(opt.id);
            container.appendChild(card);
        });

        function castVote(id) {
            if (dotsLeft > 0) {
                dotsLeft--;
                document.getElementById('dots-left').innerText = dotsLeft;
                
                const dot = document.createElement('div');
                dot.className = "w-8 h-8 bg-red-500 rounded-full border-2 border-white shadow-sm dot";
                document.getElementById(`dots-${id}`).appendChild(dot);

                if (dotsLeft === 0) {
                    document.getElementById('submit-btn').classList.remove('hidden');
                    document.getElementById('status-bar').innerHTML = "✅ 모두 사용하셨습니다!";
                }
            }
        }
    </script>
</body>
</html>
