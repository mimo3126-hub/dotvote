<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700;900&display=swap');
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}
html,body{height:100%;background:#1E1A14;}
@keyframes dotPop{0%{transform:translate(-50%,-50%) scale(0) rotate(-15deg)}60%{transform:translate(-50%,-50%) scale(1.45) rotate(5deg)}100%{transform:translate(-50%,-50%) scale(1) rotate(0deg)}}
@keyframes ripple{0%{transform:translate(-50%,-50%) scale(0.2);opacity:.85}100%{transform:translate(-50%,-50%) scale(4.5);opacity:0}}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:translateY(0)}}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
@keyframes hb{0%,70%,100%{transform:scale(1)}14%{transform:scale(1.08)}35%{transform:scale(1.04)}}
@keyframes slideR{from{opacity:0;transform:translateX(48px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideL{from{opacity:0;transform:translateX(-48px)}to{opacity:1;transform:translateX(0)}}
@keyframes glowPulse{0%,100%{opacity:1}50%{opacity:.4}}
#app{min-height:100vh;background:#1E1A14;font-family:"Noto Sans KR","Apple SD Gothic Neo",sans-serif;color:#F0EBE3;overflow-x:hidden;max-width:480px;margin:0 auto;}
.btn{border:none;cursor:pointer;font-family:inherit;border-radius:16px;font-weight:700;transition:transform .12s,opacity .12s;}
.btn:active{transform:scale(.94);}
.inp{border-radius:11px;border:1.5px solid rgba(255,255,255,.12);background:rgba(255,255,255,.06);color:#F0EBE3;font-family:inherit;padding:11px 14px;font-size:17px;width:100%;outline:none;}
.inp::placeholder{color:rgba(255,255,255,.28);}
.inp:focus{border-color:rgba(255,255,255,.28);}
.vc{touch-action:none;-webkit-user-select:none;user-select:none;border-radius:22px;position:relative;overflow:hidden;}
.vc:active:not(.dis){transform:scale(.98);transition:transform .1s;}
</style>
</head>

<div id="app"><div style="display:flex;align-items:center;justify-content:center;min-height:100vh;color:#F0EBE3;font-size:20px;font-family:sans-serif;">🔥 로딩 중...</div></div>

<script>
const {useState,useEffect,useRef,useCallback}=React;

// ─── Firebase 초기화 ────────────────────────────────────
firebase.initializeApp({

  authDomain:"dot-voting-ade78.firebaseapp.com",

const db=firebase.database();

const sg=async(path)=>{try{const s=await db.ref(path).once('value');return s.val();}catch{return null;}};
const ss=async(path,val)=>{try{await db.ref(path).set(val);}catch(e){console.error(e);}};

function playPop(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)(),t=ctx.currentTime;
    const mk=(f1,f2,vol,type,dur)=>{const o=ctx.createOscillator(),g=ctx.createGain();o.type=type;o.connect(g);g.connect(ctx.destination);o.frequency.setValueAtTime(f1,t);o.frequency.exponentialRampToValueAtTime(f2,t+dur);g.gain.setValueAtTime(vol,t);g.gain.exponentialRampToValueAtTime(.001,t+dur);o.start();o.stop(t+dur);};
    mk(900,200,.48,'sine',.18);mk(450,110,.2,'triangle',.12);mk(1300,650,.1,'sine',.08);
  }catch{}
}
function speak(txt){try{window.speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(txt);u.lang='ko-KR';u.rate=.75;u.pitch=1.1;window.speechSynthesis.speak(u);}catch{}}

const CLR=[
  {bg:'#C0392B',lgt:'#E74C3C'},{bg:'#1A5276',lgt:'#2980B9'},
  {bg:'#1E8449',lgt:'#27AE60'},{bg:'#6C3483',lgt:'#9B59B6'},
  {bg:'#A04000',lgt:'#E67E22'},{bg:'#0E6655',lgt:'#1ABC9C'},
  {bg:'#7D6608',lgt:'#F4D03F'},{bg:'#7B241C',lgt:'#CB4335'},
];
const SP='dotvote/sess',VP='dotvote/votes';

function lbl(t){return React.createElement('p',{style:{color:'#8D7B68',fontSize:13,fontWeight:700,marginBottom:7}},t);}
function stat(v,l,c){return React.createElement('div',{style:{textAlign:'center',background:'rgba(255,255,255,.06)',borderRadius:10,padding:'8px 12px'}},React.createElement('div',{style:{fontSize:22,fontWeight:900,color:c}},v),React.createElement('div',{style:{fontSize:11,color:'#6B5B48'}},l));}

// ─── Home ──────────────────────────────────────────────
function Home({sv}){
  const [sp,setSp]=useState(false);
  const [pin,setPin]=useState('');

    React.createElement('div',{style:{textAlign:'center'}},
      React.createElement('div',{style:{fontSize:64,animation:'bounce 2s ease infinite'}},'🗳️'),
      React.createElement('h1',{style:{fontSize:38,fontWeight:900,marginTop:8,background:'linear-gradient(135deg,#F5CBA7,#E59866)',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}},'도트 투표'),
      React.createElement('p',{style:{color:'#8D7B68',fontSize:16,marginTop:4}},'마을공동체 의사결정 시스템'),
      React.createElement('div',{style:{display:'flex',alignItems:'center',gap:6,justifyContent:'center',marginTop:8}},
        React.createElement('div',{style:{width:8,height:8,borderRadius:'50%',background:'#2ECC71',animation:'glowPulse 1.5s infinite'}}),
        React.createElement('span',{style:{color:'#2ECC71',fontSize:12,fontWeight:700}},'실시간 연결됨')
      )
    ),
    React.createElement('button',{className:'btn',onClick:()=>sv('participant'),style:{width:'100%',maxWidth:280,padding:'28px 20px',background:'#C0392B',color:'white',fontSize:28,display:'flex',flexDirection:'column',alignItems:'center',gap:4,boxShadow:'0 12px 32px rgba(192,57,43,.45)',animation:'hb 2.5s ease infinite',borderRadius:22}},
      React.createElement('span',{style:{fontSize:38}},'👆'),
      React.createElement('span',null,'투표 참여하기')
    ),
    React.createElement('div',{style:{textAlign:'center'}},
      !sp?React.createElement('button',{className:'btn',onClick:()=>setSp(true),style:{padding:'12px 22px',background:'rgba(255,255,255,.07)',border:'1px solid rgba(255,255,255,.1)',color:'#8D7B68',fontSize:16}},'⚙️ 진행자 (관리자)'):
      React.createElement('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',gap:12,animation:'fadeUp .3s ease'}},
        React.createElement('p',{style:{color:'#A0896E',fontSize:17}},'진행자 비밀번호'),
        React.createElement('input',{className:'inp',type:'password',value:pin,onChange:e=>{setPin(e.target.value);setErr('');},onKeyDown:e=>e.key==='Enter'&&go(),placeholder:'1234',autoFocus:true,style:{width:160,textAlign:'center',fontSize:24,letterSpacing:6}}),
        err&&React.createElement('p',{style:{color:'#E74C3C',fontSize:13}},err),
        React.createElement('div',{style:{display:'flex',gap:8}},
          React.createElement('button',{className:'btn',onClick:go,style:{padding:'12px 24px',background:'#E67E22',color:'white',fontSize:18}},'확인'),
          React.createElement('button',{className:'btn',onClick:()=>{setSp(false);setPin('');setErr('');},style:{padding:'12px 18px',background:'rgba(255,255,255,.08)',color:'#8D7B68',fontSize:18}},'취소')
        ),
        React.createElement('p',{style:{color:'#5D5248',fontSize:12}},'기본 비밀번호: 1234')
      )
    )
  );
}

// ─── Admin ─────────────────────────────────────────────
function Admin({sv}){
  const [phase,setPhase]=useState('setup');
  const [title,setTitle]=useState('');
  const [items,setItems]=useState(['','','']);
  const [dots,setDots]=useState(3);
  const [sess,setSess]=useState(null);
  const [votes,setVotes]=useState({});
  const [vc,setVc]=useState(0);

  useEffect(()=>{(async()=>{
    const s=await sg(SP);
    if(s?.status==='active'){setSess(s);setTitle(s.title);setItems(s.items.map(i=>i.text));setDots(s.dotsPerPerson);setPhase('live');}
  })();},[]);

  useEffect(()=>{
    if(phase!=='live')return;
    const r=db.ref(VP);
    r.on('value',snap=>{const v=snap.val();if(v){setVotes(v.counts||{});setVc(v.voters||0);}});
    return()=>r.off('value');
  },[phase]);

  const ui=i=>v=>setItems(a=>a.map((x,j)=>j===i?v:x));
  const add=()=>{if(items.length<8)setItems(a=>[...a,'']);};
  const rm=i=>setItems(a=>a.filter((_,j)=>j!==i));

  const start=async()=>{
    const vl=items.filter(t=>t.trim());
    if(!title.trim()){alert('투표 주제를 입력해주세요');return;}
    if(vl.length<2){alert('항목을 2개 이상 입력해주세요');return;}
    const s={title:title.trim(),items:vl.map((t,i)=>({id:String(i),text:t,...CLR[i%CLR.length]})),dotsPerPerson:dots,status:'active',startedAt:Date.now()};
    await ss(SP,s);await ss(VP,{counts:{},voters:0});
    setSess(s);setVotes({});setVc(0);setPhase('live');
  };

  const end=async()=>{if(!confirm('세션을 종료하시겠습니까?'))return;const s=await sg(SP);if(s)await ss(SP,{...s,status:'ended'});sv('home');};
  const nw=async()=>{if(!confirm('새 세션을 시작하시겠습니까?'))return;await ss(SP,null);await ss(VP,null);setPhase('setup');setSess(null);setVotes({});setVc(0);setTitle('');setItems(['','','']);setDots(3);};

  if(phase==='setup') return React.createElement('div',{style:{padding:20,minHeight:'100vh',overflowY:'auto'}},
    React.createElement('div',{style:{display:'flex',alignItems:'center',gap:10,marginBottom:22}},
      React.createElement('button',{className:'btn',onClick:()=>sv('home'),style:{background:'none',color:'#E59866',fontSize:22,padding:'6px 10px'}},'←'),
      React.createElement('h2',{style:{fontSize:22,fontWeight:900}},'📋 세션 설정')
    ),
    lbl('📌 투표 주제'),
    React.createElement('input',{className:'inp',value:title,onChange:e=>setTitle(e.target.value),placeholder:'예: 마을 행사 장소 선정',style:{marginBottom:18}}),
    lbl('🔴 1인당 스티커 개수'),
    React.createElement('div',{style:{display:'flex',alignItems:'center',gap:14,marginBottom:18}},
      React.createElement('button',{className:'btn',onClick:()=>setDots(d=>Math.max(1,d-1)),style:{width:44,height:44,background:'rgba(255,255,255,.08)',color:'white',fontSize:24,borderRadius:'50%'}},'−'),
      React.createElement('span',{style:{fontSize:40,fontWeight:900,minWidth:48,textAlign:'center'}},dots),
      React.createElement('button',{className:'btn',onClick:()=>setDots(d=>Math.min(10,d+1)),style:{width:44,height:44,background:'rgba(255,255,255,.08)',color:'white',fontSize:24,borderRadius:'50%'}},'+'),
      React.createElement('span',{style:{color:'#8D7B68',fontSize:17}},'개')
    ),
    lbl('📝 투표 항목'),
    React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:8,marginBottom:16}},
      items.map((it,i)=>React.createElement('div',{key:i,style:{display:'flex',gap:8,alignItems:'center'}},
        React.createElement('div',{style:{width:32,height:32,borderRadius:'50%',background:CLR[i%CLR.length].lgt,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900,fontSize:13,flexShrink:0}},i+1),
        React.createElement('input',{className:'inp',value:it,onChange:e=>ui(i)(e.target.value),placeholder:`항목 ${i+1}`,style:{fontSize:16,padding:'10px 13px'}}),
        items.length>2&&React.createElement('button',{className:'btn',onClick:()=>rm(i),style:{background:'none',color:'#6B4C40',fontSize:20,padding:'4px 8px'}},'✕')
      )),
      items.length<8&&React.createElement('button',{className:'btn',onClick:add,style:{padding:10,background:'rgba(255,255,255,.04)',border:'2px dashed rgba(255,255,255,.1)',color:'#E59866',fontSize:15}},'+ 항목 추가')
    ),
    React.createElement('button',{className:'btn',onClick:start,style:{width:'100%',padding:20,background:'#D35400',color:'white',fontSize:22,boxShadow:'0 8px 24px rgba(211,84,0,.4)'}},'🚀 투표 시작하기')
  );

  const si=(sess?.items||[]).slice().sort((a,b)=>(votes[b.id]||0)-(votes[a.id]||0));
  const mx=Math.max(...si.map(i=>votes[i.id]||0),1);
  const tot=Object.values(votes).reduce((a,b)=>a+b,0);

  return React.createElement('div',{style:{padding:18,minHeight:'100vh',overflowY:'auto'}},
    React.createElement('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:16,gap:8}},
      React.createElement('div',null,
        React.createElement('div',{style:{display:'flex',alignItems:'center',gap:6,marginBottom:4}},
          React.createElement('div',{style:{width:8,height:8,borderRadius:'50%',background:'#2ECC71',animation:'glowPulse 1s infinite'}}),
          React.createElement('span',{style:{color:'#2ECC71',fontSize:13,fontWeight:700}},'🔥 실시간 집계 중')
        ),
        React.createElement('h2',{style:{fontSize:19,fontWeight:900,lineHeight:1.2}},sess?.title)
      ),
      React.createElement('div',{style:{display:'flex',gap:7,flexShrink:0}},stat(vc,'참여자','#74b9ff'),stat(tot,'스티커','#fd79a8'))
    ),
    React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:10,marginBottom:14}},
      si.map((it,rk)=>{
        const cnt=votes[it.id]||0,pct=mx>0?(cnt/mx)*100:0,top=rk===0&&cnt>0;
        return React.createElement('div',{key:it.id,style:{background:top?it.bg+'33':'rgba(255,255,255,.04)',border:`1.5px solid ${top?it.lgt+'55':'rgba(255,255,255,.06)'}`,borderRadius:15,padding:'13px 15px',transition:'all .5s'}},
          React.createElement('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}},
            React.createElement('div',{style:{display:'flex',alignItems:'center',gap:7}},
              top&&React.createElement('span',{style:{fontSize:18}},'👑'),
              React.createElement('div',{style:{width:28,height:28,borderRadius:'50%',background:it.lgt,display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900,fontSize:12,flexShrink:0}},Number(it.id)+1),
              React.createElement('span',{style:{fontSize:16,fontWeight:700}},it.text)
            ),
            React.createElement('span',{style:{fontSize:30,fontWeight:900,color:it.lgt}},cnt)
          ),
          React.createElement('div',{style:{height:8,background:'rgba(255,255,255,.07)',borderRadius:4,marginBottom:8,overflow:'hidden'}},
            React.createElement('div',{style:{height:'100%',width:`${pct}%`,background:it.lgt,borderRadius:4,transition:'width .6s cubic-bezier(.4,0,.2,1)'}})
          ),
          React.createElement('div',{style:{display:'flex',flexWrap:'wrap',gap:4}},
            Array.from({length:cnt}).map((_,i)=>React.createElement('div',{key:i,style:{width:16,height:16,borderRadius:'50%',background:'radial-gradient(circle at 35% 35%,#FF6B6B,#C0392B)',boxShadow:'0 2px 5px rgba(192,57,43,.6)'}}))
          )
        );
      })
    ),
    React.createElement('div',{style:{display:'flex',gap:8}},
      React.createElement('button',{className:'btn',onClick:nw,style:{flex:1,padding:13,background:'rgba(255,255,255,.07)',color:'#8D7B68',fontSize:15}},'새 세션'),
      React.createElement('button',{className:'btn',onClick:end,style:{flex:1,padding:13,background:'#7B241C',color:'white',fontSize:15,fontWeight:700}},'세션 종료')
    )
  );
}

// ─── Participant ────────────────────────────────────────
function Participant({sv}){
  const [phase,setPhase]=useState('loading');
  const [sess,setSess]=useState(null);
  const [idx,setIdx]=useState(0);
  const [seenAll,setSeenAll]=useState(false);
  const [dl,setDl]=useState(0);
  const [myD,setMyD]=useState({});
  const [rips,setRips]=useState([]);
  const [dis,setDis]=useState(false);
  const [dir,setDir]=useState('R');
  const ref=useRef(null);

  useEffect(()=>{(async()=>{
    const s=await sg(SP);
    if(!s||s.status==='ended'){setPhase(s?.status==='ended'?'done':'waiting');return;}
    if(s.status==='active'){setSess(s);setDl(s.dotsPerPerson);setPhase('preview');}
  })();},[]);

  useEffect(()=>{
    if(phase!=='waiting')return;
    const r=db.ref(SP);
    r.on('value',snap=>{const s=snap.val();if(s?.status==='active'){setSess(s);setDl(s.dotsPerPerson);setPhase('preview');}});
    return()=>r.off('value');
  },[phase]);

  useEffect(()=>{if(sess&&idx===sess.items.length-1)setSeenAll(true);},[idx,sess]);

  const nx=()=>{setDir('R');setIdx(i=>Math.min(i+1,(sess?.items.length||1)-1));};
  const pv=()=>{setDir('L');setIdx(i=>Math.max(0,i-1));};

  const tap=useCallback(async(e)=>{
    if(dis||dl<=0||!sess||phase!=='voting')return;
    e.preventDefault();
    const rc=ref.current?.getBoundingClientRect();if(!rc)return;
    const cx=e.touches?e.touches[0].clientX:e.clientX;
    const cy=e.touches?e.touches[0].clientY:e.clientY;
    const xP=Math.max(5,Math.min(95,((cx-rc.left)/rc.width)*100));
    const yP=Math.max(5,Math.min(95,((cy-rc.top)/rc.height)*100));
    const iid=sess.items[idx].id,did=Date.now()+Math.random();
    setMyD(d=>({...d,[iid]:[...(d[iid]||[]),{x:xP,y:yP,id:did}]}));
    setRips(r=>[...r,{id:did,x:xP,y:yP}]);
    setTimeout(()=>setRips(r=>r.filter(rt=>rt.id!==did)),700);
    const nl=dl-1;setDl(nl);playPop();
    try{await db.ref(`${VP}/counts/${iid}`).transaction(c=>(c||0)+1);}catch{}
    if(nl<=0){
      setDis(true);
      setTimeout(()=>speak('스티커를 모두 사용하셨습니다. 투표가 완료되었습니다. 감사합니다!'),200);
      try{await db.ref(`${VP}/voters`).transaction(c=>(c||0)+1);}catch{}
      setTimeout(()=>setPhase('done'),3500);
    }
  },[dis,dl,phase,idx,sess]);

  if(phase==='loading'||phase==='waiting') return React.createElement('div',{style:{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'100vh',gap:22,padding:24}},
    React.createElement('div',{style:{fontSize:64,animation:'bounce 1.8s infinite'}},'⏳'),
    React.createElement('h2',{style:{fontSize:28,fontWeight:900,textAlign:'center'}},'진행자를 기다리는 중'),
    React.createElement('p',{style:{color:'#6B5B48',fontSize:19,textAlign:'center',lineHeight:1.7}},'곧 시작됩니다!',React.createElement('br'),'잠시 기다려 주세요'),
    React.createElement('div',{style:{display:'flex',alignItems:'center',gap:6,marginTop:8}},
      React.createElement('div',{style:{width:8,height:8,borderRadius:'50%',background:'#2ECC71',animation:'glowPulse 1s infinite'}}),
      React.createElement('span',{style:{color:'#2ECC71',fontSize:13}},'자동으로 시작됩니다')
    ),
    React.createElement('button',{className:'btn',onClick:()=>sv('home'),style:{padding:'13px 22px',background:'rgba(255,255,255,.07)',color:'#8D7B68',fontSize:17,marginTop:8}},'← 처음으로')
  );

  if(phase==='preview'&&sess){
    const it=sess.items[idx],isL=idx===sess.items.length-1;
    return React.createElement('div',{style:{display:'flex',flexDirection:'column',minHeight:'100vh',padding:16}},
      React.createElement('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}},
        React.createElement('button',{className:'btn',onClick:()=>sv('home'),style:{background:'none',color:'#E59866',fontSize:20,padding:'6px 10px'}},'←'),
        React.createElement('div',{style:{textAlign:'center'}},
          React.createElement('p',{style:{color:'#6B5B48',fontSize:12,fontWeight:700}},'📖 미리보기'),
          React.createElement('p',{style:{fontSize:15,fontWeight:700}},sess.title)
        ),
        React.createElement('span',{style:{color:'#6B5B48',fontSize:16,fontWeight:700}},`${idx+1}/${sess.items.length}`)
      ),
